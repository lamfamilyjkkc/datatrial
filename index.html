<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meter OCR Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body{
    font-family:Arial;
    padding:15px;
    max-width:600px;
    margin:auto;
}
button{
    width:100%;
    padding:14px;
    margin:8px 0;
    font-size:18px;
}
textarea{
    width:100%;
    height:180px;
    font-size:16px;
}
#status{
    margin:10px 0;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>📱 Meter OCR Mobile</h2>

<input type="file" accept="image/*" capture="environment" id="imageInput">

<div id="status">Waiting for image...</div>

<button onclick="runOCR()">Run OCR</button>

<textarea id="result"></textarea>

<button onclick="copyResult()">Copy Data</button>

<script>
let imageFile=null;

document.getElementById('imageInput').addEventListener('change', function(e){
    imageFile = e.target.files[0];
});

async function runOCR(){
    if(!imageFile){
        alert("Please select image");
        return;
    }

    document.getElementById("status").innerText="Processing OCR...";

    const { data:{ text } } = await Tesseract.recognize(imageFile,'eng');

    let lines = text.split('\n');
    let output=[];

    lines.forEach(line=>{
        // match large numbers only
        let nums = line.match(/[\d,]+\.\d{2}|[\d,]+/g);

        if(nums && nums.length >= 5){
            let clean = nums.map(n=>n.replace(/,/g,''));
            output.push(clean.join(' '));
        }
    });

    document.getElementById("result").value = output.join('\n');
    document.getElementById("status").innerText="OCR complete";
}

function copyResult(){
    let txt=document.getElementById("result");
    txt.select();
    document.execCommand("copy");
    alert("Copied");
}
</script>

</body>
</html>
