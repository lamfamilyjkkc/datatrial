<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Data Bridge 1 (Column Slotting)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); max-width: 1200px; margin: auto; }
        h2 { color: #0056b3; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #drop-zone { border: 3px dashed #007bff; padding: 40px; text-align: center; color: #007bff; cursor: pointer; margin-bottom: 20px; border-radius: 12px; background: #f8fbff; font-weight: bold; }
        #drop-zone:hover { background: #eef5ff; }
        textarea { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 12px; margin-bottom: 15px; font-family: monospace; background: #fafafa; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; min-width: 1000px; }
        th { background: #007bff; color: white; padding: 10px; font-size: 12px; }
        td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
        input { width: 95%; border: 1px solid transparent; text-align: center; font-size: 14px; padding: 5px; }
        input:focus { border: 1px solid #007bff; background: #fff9e6; outline: none; }
        .btn { padding: 12px 25px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; width: 100%; font-size: 18px; margin-top: 30px; }
        .status-bar { padding: 15px; border-radius: 8px; background: #fff3cd; color: #856404; margin: 10px 0; font-weight: bold; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="card">
    <h2>數據轉運站 1 (自動對位版)</h2>
    
    <div id="drop-zone">📸 模式 2：拖放相片到此 (自動對準 TX2 開始排位)</div>
    <input type="file" id="file-input" style="display:none" accept="image/*">
    
    <div id="status" class="status-bar">準備就緒：請確保已入 Token 同 Gist ID</div>

    <textarea id="raw-input" rows="6" placeholder="原始文字會顯示喺呢度..."></textarea>
    
    <button class="btn btn-primary" onclick="processRawText()">🔍 重新分析對位</button>
    
    <div class="table-container">
        <table id="data-table">
            <thead>
                <tr>
                    <th>操作</th><th>日期</th><th>時間</th>
                    <th>TX2</th><th>TX3</th><th>TX4</th><th>TX5</th><th>TX6</th>
                    <th>TX7</th><th>TX8</th><th>TX9</th><th>TX10</th><th>TX11</th><th>TX12</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
    </div>

    <button class="btn btn-success" onclick="saveToGist()">💾 同步至雲端 (返公司 Copy)</button>
</div>

<script>
    const GIST_ID = localStorage.getItem('ehs_gist_id');
    const GITHUB_TOKEN = localStorage.getItem('ehs_token');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        if (!e.target.files[0]) return;
        status.innerText = "⏳ 辨識中... 請等 5-10 秒...";
        try {
            const { data: { text } } = await Tesseract.recognize(e.target.files[0], 'eng');
            document.getElementById('raw-input').value = text;
            processRawText();
        } catch (err) { status.innerText = "❌ 辨識失敗。"; }
    };

    function processRawText() {
        const rawText = document.getElementById('raw-input').value;
        // 抓取格式如 42,520,664.00 的數字
        const pattern = /\d{1,3}(,\d{3})*(\.\d{2})/g;
        let matches = rawText.match(pattern) || [];
        
        const dataBody = document.getElementById('data-body');
        dataBody.innerHTML = ""; 

        if (matches.length > 0) {
            const tr = document.createElement('tr');
            // 前三格：Copy掣、日期、時間
            let cellsHTML = `
                <td><button class="btn-primary" style="padding:5px 10px;" onclick="copyRow(this)">📋 Copy</button></td>
                <td><input type="text" value="${new Date().toLocaleDateString('en-GB')}"></td>
                <td><input type="text" value="${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}"></td>
            `;
            
            // 核心邏輯：由 TX2 順序排落去，最多 11 個位 (TX2-TX12)
            for (let i = 0; i < 11; i++) {
                const val = matches[i] || ""; // 如果無數就留空，方便手動補
                cellsHTML += `<td><input type="text" value="${val}"></td>`;
            }
            
            tr.innerHTML = cellsHTML;
            dataBody.appendChild(tr);
            
            status.innerText = `✅ 成功對位！執到 ${matches.length} 個數。已填入 TX2 開始嘅欄位。`;
            status.style.background = "#d4edda";
            status.style.color = "#155724";
        } else {
            status.innerText = "⚠️ 搵唔到數據格式！";
            status.style.background = "#f8d7da";
        }
    }

    function copyRow(btn) {
        const row = btn.parentElement.parentElement;
        const inputs = Array.from(row.querySelectorAll('input'));
        const text = inputs.map(i => i.value).join('\t');
        navigator.clipboard.writeText(text);
        btn.innerText = "✅ OK";
        setTimeout(() => btn.innerText = "📋 Copy", 2000);
    }

    async function saveToGist() {
        const rows = Array.from(document.querySelectorAll('#data-body tr'));
        if (rows.length === 0) return alert("無數據！");
        const allData = rows.map(tr => Array.from(tr.querySelectorAll('input')).map(i => i.value).join('\t')).join('\n');
        if (!GIST_ID || !GITHUB_TOKEN) return alert("未入 Token/Gist ID！");
        status.innerText = "☁️ 傳送中...";
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` },
                body: JSON.stringify({ files: { "daily_ehs.txt": { content: allData } } })
            });
            if (res.ok) {
                status.innerText = "✅ 同步成功！";
                alert("已 Save 到雲端！");
            }
        } catch (err) { alert("網絡故障。"); }
    }

    window.onload = async () => {
        if (GIST_ID && GITHUB_TOKEN) {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                if (res.ok) {
                    const gist = await res.json();
                    const content = gist.files["daily_ehs.txt"].content;
                    if (content && content !== "0") {
                        const lines = content.split('\n');
                        lines.forEach(line => {
                            const cells = line.split('\t');
                            if (cells.length >= 5) {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `<td><button class="btn-primary" style="padding:5px 10px;" onclick="copyRow(this)">📋 Copy</button></td>${cells.map(c => `<td><input type="text" value="${c}"></td>`).join('')}`;
                                document.getElementById('data-body').appendChild(tr);
                            }
                        });
                        status.innerText = "📂 已加載雲端舊數據。";
                    }
                }
            } catch (e) {}
        }
    };
</script>
</body>
</html>
