<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meter OCR Pro</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; padding: 15px; max-width: 600px; margin: auto; }
button { width: 100%; padding: 14px; margin: 8px 0; font-size: 18px; }
textarea { width: 100%; height: 180px; font-size: 16px; }
#status { margin: 10px 0; font-weight: bold; }
</style>
</head>
<body>

<h2>📱 Meter OCR v2 (Enhanced)</h2>

<input type="file" accept="image/*" capture="environment" id="imageInput">
<div id="status">Waiting for image...</div>

<button onclick="runOCR()">🚀 Run OCR</button>

<h3>Result</h3>
<textarea id="result"></textarea>

<button onclick="copyTSV()">📋 Copy for Excel</button>

<script>

let imageFile = null;

document.getElementById('imageInput').addEventListener('change', e => {
    imageFile = e.target.files[0];
});

async function runOCR(){

    if(!imageFile){
        alert("Select image first");
        return;
    }

    document.getElementById("status").innerText = "⏳ Processing...";

    const img = new Image();
    img.src = URL.createObjectURL(imageFile);
    await new Promise(r => img.onload = r);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // 🔥 放寬裁切
    const cropTop = img.height * 0.2;
    const cropHeight = img.height * 0.7;

    canvas.width = img.width;
    canvas.height = cropHeight;

    ctx.drawImage(img, 0, cropTop, img.width, cropHeight, 0, 0, img.width, cropHeight);

    // 🔥 影像強化（關鍵）
    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imageData.data;

    for(let i = 0; i < data.length; i += 4){
        let gray = (data[i] + data[i+1] + data[i+2]) / 3;

        // threshold（調高對比）
        let value = gray > 150 ? 255 : 0;

        data[i] = value;
        data[i+1] = value;
        data[i+2] = value;
    }

    ctx.putImageData(imageData, 0, 0);

    // 🔥 OCR
    const { data: { text } } = await Tesseract.recognize(
        canvas,
        'eng',
        {
            tessedit_char_whitelist: '0123456789.,'
        }
    );

    console.log("RAW OCR:", text);

    // 🔥 抽數
    let nums = text.match(/\d{5,}\.?\d*/g) || [];

    if(nums.length === 0){
        document.getElementById("status").innerText = "❌ OCR failed (no numbers)";
        return;
    }

    // 🔥 重組11欄
    let rows = [];
    for(let i = 0; i < nums.length; i += 11){
        let row = nums.slice(i, i + 11);
        if(row.length === 11){
            rows.push(row.join(' '));
        }
    }

    document.getElementById("result").value = rows.join('\n');

    document.getElementById("status").innerText =
        "✅ " + rows.length + " row(s) detected (" + nums.length + " numbers)";
}

// copy
function copyTSV(){
    let text = document.getElementById("result").value.trim();
    if(!text){
        alert("No data");
        return;
    }

    let lines = text.split('\n');
    let tsv = lines.map(line =>
        line.replace(/,/g,'').split(/\s+/).join('\t')
    );

    navigator.clipboard.writeText(tsv.join('\n'));
    alert("Copied");
}

</script>

</body>
</html>
