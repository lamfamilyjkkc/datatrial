<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHS OCR Pro v4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 15px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        #drop-zone { border: 2px dashed #007bff; padding: 40px 10px; text-align: center; border-radius: 10px; color: #569cd6; background: #1a2633; cursor: pointer; }
        .data-list { list-style: none; padding: 0; }
        .data-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-family: monospace; }
        .tx-label { color: #888; }
        .tx-value { color: #00ff00; font-weight: bold; font-size: 1.1rem; }
        .btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: #444; margin-top: 5px; }
        #status { text-align: center; margin: 10px 0; font-size: 0.9rem; color: #ffa500; }
    </style>
</head>
<body>

<div class="card">
    <div id="drop-zone">📸 影相 / 揀選承包商截圖</div>
    <input type="file" id="file-input" style="display:none" accept="image/*">
    <div id="status">Ready</div>
</div>

<div id="result-area" class="card" style="display:none;">
    <h3 style="margin-top:0;">辨識結果 (垂直排列)</h3>
    <div id="row-info" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;"></div>
    <div id="data-items" class="data-list"></div>
    <button class="btn" onclick="copyVertical()">一鍵複製 (垂直方便 Transpose)</button>
    <button class="btn btn-secondary" onclick="window.location.reload()">重新影相</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('result-area');
    const dataItems = document.getElementById('data-items');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        if (!e.target.files[0]) return;
        status.innerText = "⚡ 正在優化圖像並辨識中...";
        
        // 使用 Tesseract 並增加參數提升準確度
        const { data: { text } } = await Tesseract.recognize(e.target.files[0], 'eng', {
            tessedit_char_whitelist: '0123456789., ' // 只准認數字同點，減少認錯英文字
        });

        // Regex 優化：專門搵包含小數點或逗號嘅長數字
        const regex = /\d{1,3}(,\d{3})*(\.\d{2})/g;
        let found = text.match(regex) || [];
        
        // 過濾掉明顯唔係數據嘅細數字（例如日期 2026）
        let cleaned = found.filter(n => n.length > 5);

        if (cleaned.length >= 11) {
            resultArea.style.display = 'block';
            status.innerText = "✅ 辨識完成";
            
            // 處理多日數據邏輯：每 11 個數為一組
            let totalRows = Math.ceil(cleaned.length / 11);
            document.getElementById('row-info').innerText = `共發現 ${cleaned.length} 個數值 (約 ${totalRows} 日數據)。顯示首 11 個：`;
            
            window.currentNumbers = cleaned.slice(0, 11);
            renderList(window.currentNumbers);
        } else {
            status.innerText = "❌ 辨識失敗。請確保相片清晰，或嘗試近影數字區域。";
            console.log("Raw text:", text); // 方便 Debug
        }
    };

    function renderList(nums) {
        dataItems.innerHTML = '';
        nums.forEach((num, index) => {
            dataItems.innerHTML += `
                <div class="data-item">
                    <span class="tx-label">TX${index + 2}</span>
                    <span class="tx-value">${num}</span>
                </div>`;
        });
    }

    function copyVertical() {
        // 垂直複製，一行一個數
        const text = window.currentNumbers.join('\n');
        navigator.clipboard.writeText(text);
        alert("已垂直複製！返到 Excel 用 Transpose 貼上即可。");
    }
</script>
</body>
</html>
