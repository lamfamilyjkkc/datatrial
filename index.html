<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHS OCR Precision v7.5</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #00e676; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; padding: 15px; margin: 0; text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        #drop-zone { border: 2px dashed #555; padding: 30px 10px; border-radius: 10px; cursor: pointer; color: #888; }
        canvas { width: 100%; border-radius: 5px; margin-top: 15px; display: none; border: 1px solid #555; }
        .day-box { background: #262626; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--accent); }
        .num-row { display: flex; justify-content: space-between; font-family: monospace; padding: 6px 0; border-bottom: 1px solid #333; font-size: 1.1rem; }
        .btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { color: #ffa500; margin: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h3>EHS 數據精準採集站</h3>
    <div id="drop-zone">📸 影相或揀選截圖 (請影近啲)</div>
    <input type="file" id="file-input" style="display:none" accept="image/*">
    <canvas id="proc-canvas"></canvas>
    <div id="status">Ready</div>
</div>

<div id="results"></div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const status = document.getElementById('status');
    const resultsDiv = document.getElementById('results');
    const canvas = document.getElementById('proc-canvas');
    const ctx = canvas.getContext('2d');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "⏳ 影像強化中...";
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = async () => {
                // 1. 調整 Canvas 大小
                canvas.width = img.width;
                canvas.height = img.height;
                
                // 2. 基本濾鏡：去色、高對比
                ctx.filter = 'grayscale(1) contrast(2.5) brightness(0.9)';
                ctx.drawImage(img, 0, 0);
                
                // 3. 底層像素處理 (二值化)
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    let v = brightness > 120 ? 255 : 0; // 門檻設定在 120
                    data[i] = data[i+1] = data[i+2] = v;
                }
                ctx.putImageData(imageData, 0, 0);
                canvas.style.display = 'block';

                status.innerText = "🤖 正在深度辨識數字...";
                
                try {
                    const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
                        tessedit_char_whitelist: '0123456789., '
                    });
                    parseData(text);
                } catch (err) {
                    status.innerText = "❌ 辨識失敗";
                }
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    function parseData(text) {
        // Regex 搵出格式為 12,345,678.00 嘅數
        const regex = /\d{1,3}(,\d{3})*(\.\d{2})/g;
        let found = (text.match(regex) || []).filter(n => n.length > 5);

        if (found.length === 0) {
            status.innerText = "❌ 搵唔到數據。提示：請試吓只影數字區域。";
            return;
        }

        status.innerText = `✅ 搵到 ${found.length} 個數值`;
        resultsDiv.innerHTML = '';

        // 每 11 個分一組 (Day 1, Day 2...)
        for (let i = 0; i < found.length; i += 11) {
            const group = found.slice(i, i + 11);
            renderGroup(group, Math.floor(i/11) + 1);
        }
    }

    function renderGroup(nums, dayIdx) {
        const div = document.createElement('div');
        div.className = 'day-box';
        let html = `<b style="color:#00e676">第 ${dayIdx} 日數據</b><hr style="border:0;border-top:1px solid #444;margin:10px 0;">`;
        
        nums.forEach((n, i) => {
            html += `<div class="num-row"><span>TX${i+2}</span><span style="color:#00e676">${n}</span></div>`;
        });

        const raw = nums.join('\n');
        html += `<button class="btn" onclick="copyRaw(\`${raw}\`)">一鍵複製 (垂直排列)</button>`;
        div.innerHTML = html;
        resultsDiv.appendChild(div);
    }

    function copyRaw(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert("已複製！返 Excel 做 Transpose 貼上。");
    }
</script>
</body>
</html>
