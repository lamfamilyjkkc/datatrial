<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Data Bridge</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        #drop-zone { border: 2px dashed #007bff; padding: 30px; text-align: center; color: #007bff; cursor: pointer; margin-bottom: 20px; border-radius: 10px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 5px; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        input { width: 95%; border: 1px solid transparent; text-align: center; }
        .btn { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; margin: 5px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h2>EHS 數據轉運站 (Lam Family)</h2>
    <div id="drop-zone">📸 模式 2：私人電腦拖放相片到此</div>
    <input type="file" id="file-input" style="display:none">
    <textarea id="raw-input" rows="4" placeholder="模式 1：貼上手機辨識到嘅文字雜訊..."></textarea>
    <button class="btn btn-primary" onclick="processRawText()">✨ 過濾並分行 (11個數/行)</button>
    <div id="status" style="margin:10px 0; color: #666;">等待輸入...</div>
    <table id="data-table">
        <thead>
            <tr id="header-row">
                <th>Action</th><th>Date</th><th>Time</th>
                <th>TX2</th><th>TX3</th><th>TX4</th><th>TX5</th><th>TX6</th>
                <th>TX7</th><th>TX8</th><th>TX9</th><th>TX10</th><th>TX11</th><th>TX12</th>
            </tr>
        </thead>
        <tbody id="data-body"></tbody>
    </table>
    <button class="btn btn-success" onclick="saveToGist()">💾 Save to Cloud (同步至雲端)</button>
</div>
<script>
    const GIST_ID = localStorage.getItem('ehs_gist_id');
    const GITHUB_TOKEN = localStorage.getItem('ehs_token');
    const dz = document.getElementById('drop-zone');
    dz.onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = async (e) => {
        document.getElementById('status').innerText = "OCR 辨識中... 請稍候";
        const { data: { text } } = await Tesseract.recognize(e.target.files[0], 'eng');
        document.getElementById('raw-input').value = text;
        processRawText();
    };
    function processRawText() {
        const rawText = document.getElementById('raw-input').value;
        const pattern = /\d{1,3}(,\d{3})*(\.\d{2})/g;
        const matches = rawText.match(pattern) || [];
        const dataBody = document.getElementById('data-body');
        dataBody.innerHTML = ""; 
        for (let i = 0; i < matches.length; i += 11) {
            const rowData = matches.slice(i, i + 11);
            if (rowData.length < 11) continue; 
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><button class="btn-primary" onclick="copyRow(this)">📋 Copy</button></td>
                            <td><input type="text" value="${new Date().toLocaleDateString()}"></td>
                            <td><input type="text" value="11:00 AM"></td>`;
            rowData.forEach(val => { tr.innerHTML += `<td><input type="text" value="${val}"></td>`; });
            dataBody.appendChild(tr);
        }
        document.getElementById('status').innerText = `搵到 ${Math.floor(matches.length/11)} 日數據。`;
    }
    function copyRow(btn) {
        const row = btn.parentElement.parentElement;
        const inputs = Array.from(row.querySelectorAll('input'));
        const text = inputs.map(i => i.value).join('\t');
        navigator.clipboard.writeText(text);
        btn.innerText = "✅ Copied";
        setTimeout(() => btn.innerText = "📋 Copy", 2000);
    }
    async function saveToGist() {
        const rows = Array.from(document.querySelectorAll('#data-body tr'));
        const allData = rows.map(tr => Array.from(tr.querySelectorAll('input')).map(i => i.value).join('\t')).join('\n');
        if (!GIST_ID || !GITHUB_TOKEN) return alert("請先設置 Token 同 Gist ID (喺 Console 行 localStorage.setItem)");
        const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` },
            body: JSON.stringify({ files: { "daily_ehs.txt": { content: allData } } })
        });
        if (res.ok) alert("✅ 同步成功！返公司開網頁就見到。");
    }
    window.onload = async () => {
        if (GIST_ID) {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            if (res.ok) {
                const gist = await res.json();
                const content = gist.files["daily_ehs.txt"].content;
                if (content !== "0" && content !== "ready") {
                    document.getElementById('raw-input').value = content.replace(/\t/g, ' ');
                    processRawText();
                    document.getElementById('status').innerText = "已加載雲端最新數據。";
                }
            }
        }
    };
</script>
</body>
</html>
